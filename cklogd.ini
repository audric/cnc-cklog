[cklogd]
dbdir         = .
retain_months = 24
debug         = false

; Define one section per log file.
; Section name becomes the DB filename prefix: cnc1_YYYY_MM.db

[cnc1]
file       = cnclogs/cnc1.log
max_fields = 4
; api_url       = https://api.example.com/logs
; api_auth_type  = bearer         ; bearer or basic
; api_auth_token = mysecrettoken  ; bearer token, or basic password
; api_auth_user  = myuser         ; basic auth only

[cnc1.columns]
1 = event
2 = program
3 = ip
4 = timestamp

; Example: second log with different schema
; [spindle]
; file       = cnclogs/spindle.log
; max_fields = 3
;
; [spindle.columns]
; 1 = event
; 2 = axis
; 3 = value
